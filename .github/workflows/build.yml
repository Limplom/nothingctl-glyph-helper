name: Build DEX

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to upload assets to a GitHub release
    steps:
      - uses: actions/checkout@v4

      # JDK 17 required by sdkmanager v16+ (android-actions/setup-android@v3).
      # Java sources are still compiled with sourceCompatibility = 11 (see app/build.gradle).
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform + build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build DEX
        run: gradle :app:buildDex
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload DEX artifact
        uses: actions/upload-artifact@v4
        with:
          name: glyph-helper-dex
          path: app/build/outputs/dex/classes.dex

      - name: Attach DEX to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/dex/classes.dex
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
